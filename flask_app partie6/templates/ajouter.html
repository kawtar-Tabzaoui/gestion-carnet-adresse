<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ajouter un contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card p-4 shadow">
            <h2 class="mb-4">➕ Ajouter un contact</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">
                        ⚠️ {{ message }}<br>
                        <small>Veuillez corriger et réessayer.</small>
                    </div>
                {% endfor %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nom</label>
                    <input type="text" name="nom" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" name="email" class="form-control" required>
                    <small class="text-muted">ex: nom@gmail.com</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Téléphone</label>
                    <input type="text" name="telephone" class="form-control" required>
                    <small class="text-muted">10 chiffres, commence par 06 ou 07</small>
                </div>
                <button type="submit" class="btn btn-success w-100">✅ Confirmer</button>
                <a href="/" class="btn btn-secondary w-100 mt-2">⬅️ Retour</a>
            </form>
        </div>
    </div>
</body>
</html>
