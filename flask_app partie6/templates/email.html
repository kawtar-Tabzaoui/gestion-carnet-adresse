<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Envoyer un Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card p-4 shadow">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📧 Envoyer un Email</h2>
        <a href="/" class="btn btn-primary">🏠 Home</a>
    </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Destinataire</label>
                    <input type="text" name="destinataire" class="form-control" value="{{ contact[2] }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Sujet</label>
                    <input type="text" name="sujet" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea name="message" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-info text-white w-100">📨 Envoyer</button>
                <a href="/" class="btn btn-danger w-100 mt-2">❌ Annuler</a>
            </form>
        </div>
    </div>
</body>
</html>
