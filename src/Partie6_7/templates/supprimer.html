<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Supprimer un contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card p-4 shadow">
            <h2 class="mb-4">🗑️ Supprimer un contact</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nom, Email ou ID</label>
                    <input type="text" name="info" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-danger w-100">🗑️ Supprimer</button>
                <a href="/" class="btn btn-secondary w-100 mt-2">⬅️ Retour</a>
            </form>
        </div>
    </div>
</body>
</html>
