<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Envoyer WhatsApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card p-4 shadow">
            <div class="d-flex justify-content-between align-items-center mb-4">

    <h2>
        📱 Envoyer WhatsApp
    </h2>

    <a href="/" class="btn btn-dark shadow-sm">

        🏠 Home

    </a>

</div>

            {% if lien %}
            <script>
                window.open("{{ lien }}", "_blank");
            </script>
            <div class="alert alert-success">✅ WhatsApp ouvert dans un nouvel onglet !</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Destinataire</label>
                    <input type="text" class="form-control" value="{{ contact[1] }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Numéro</label>
                    <input type="text" class="form-control" value="{{ contact[3] }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea name="message" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100">📱 Envoyer WhatsApp</button>
                <a href="/" class="btn btn-danger w-100 mt-2">❌ Annuler</a>
            </form>
        </div>
    </div>
</body>
</html>
