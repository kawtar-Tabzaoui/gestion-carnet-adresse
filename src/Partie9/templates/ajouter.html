<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ajouter un contact</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5" style="max-width: 650px;">

        <div class="card p-4 shadow-lg">

            <div class="d-flex justify-content-between align-items-center mb-4">

    <h2>
        ➕ Ajouter un contact
    </h2>

    <a href="/" class="btn btn-dark shadow-sm">

        🏠 Home

    </a>

</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}

                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">

                        ⚠️ {{ message }}

                        <br>

                        <small>
                            Veuillez corriger et réessayer.
                        </small>

                    </div>

                {% endfor %}
            {% endwith %}

            <form method="POST">

                <!-- NOM -->
                <div class="mb-3">

                    <label class="form-label">
                        👤 Nom
                    </label>

                    <input
                    type="text"
                    name="nom"
                    class="form-control"
                    required>

                </div>

                <!-- EMAIL -->
                <div class="mb-3">

                    <label class="form-label">
                        📧 Email
                    </label>

                    <input
                    type="text"
                    name="email"
                    class="form-control"
                    required>

                    <small class="text-muted">
                        ex: nom@gmail.com
                    </small>

                </div>

                <!-- TELEPHONE -->
                <div class="mb-3">

                    <label class="form-label">
                        📱 Téléphone
                    </label>

                    <input
                    type="text"
                    name="telephone"
                    class="form-control"
                    required>

                    <small class="text-muted">
                        10 chiffres, commence par 06 ou 07
                    </small>

                </div>

                <!-- CATEGORIE -->
                <div class="mb-3">

                    <label class="form-label">
                        🏷️ Catégorie
                    </label>

                    <select
                    name="categorie"
                    class="form-control">

                        <option value="Client">
                            Client
                        </option>

                        <option value="Fournisseur">
                            Fournisseur
                        </option>

                        <option value="Laboratoire">
                            Laboratoire
                        </option>

                    </select>

                </div>

                <!-- ADRESSE -->
                <div class="mb-3">

                    <label class="form-label">
                        📍 Adresse
                    </label>

                    <input
                    type="text"
                    name="adresse"
                    class="form-control">

                </div>

                <!-- FONCTION -->
                <div class="mb-3">

                    <label class="form-label">
                        👔 Fonction
                    </label>

                    <input
                    type="text"
                    name="fonction"
                    class="form-control">

                </div>

                <!-- ENTREPRISE -->
                <div class="mb-3">

                    <label class="form-label">
                        🏢 Entreprise
                    </label>

                    <input
                    type="text"
                    name="entreprise"
                    class="form-control">

                </div>

                <!-- BOUTONS -->
                <button
                type="submit"
                class="btn btn-success w-100">

                    ✅ Confirmer

                </button>

                <a
                href="/"
                class="btn btn-secondary w-100 mt-2">

                    ⬅️ Retour

                </a>

            </form>

        </div>

    </div>

</body>
</html>
